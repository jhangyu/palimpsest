# ---
# name: docker-compose.test
# description: "CI test stack: ephemeral postgres on tmpfs, limited Chrome sessions, app on port 18088, LLM profiles disabled"
# type: deployment
# target:
#   layer: infrastructure
#   domain: deployment
# spec_doc: null
# test_file: tests/stage3/test_stage3_docker.sh
# services: [db-test, chrome-test, app-test]
# ---
services:
  db-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: palimpsest
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: palimpsest_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palimpsest"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  chrome-test:
    image: browserless/chrome:latest
    environment:
      MAX_CONCURRENT_SESSIONS: 2

  app-test:
    image: ${IMAGE_TAG:-jhangyu/palimpsest:0.1.1}
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://palimpsest:testpass123@db-test:5432/palimpsest_test"
      POSTGRES_HOST: "db-test"
      CHROME_HOST: "chrome-test"
      CHROME_WS_ENDPOINT: "ws://chrome-test:3000"
      LLM_PROVIDER_PROFILES_ENABLED: "false"
      ALLOWED_ORIGINS: "http://localhost:8088"
    ports:
      - "18088:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health', timeout=5).read()"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
