services:
  db:
    image: postgres:15-alpine
    container_name: palimpsest-db
    environment:
      POSTGRES_USER: palimpsest
      POSTGRES_PASSWORD: palimpsest
      POSTGRES_DB: palimpsest
    volumes:
      - /Users/jhangyu/project/palimpsest/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palimpsest -d palimpsest"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - palimpsest-network

  chrome:
    image: browserless/chrome:latest
    container_name: palimpsest-chrome
    environment:
      MAX_CONCURRENT_SESSIONS: 10
      CONNECTION_TIMEOUT: 300000
    ports:
      - "3000:3000"
    networks:
      - palimpsest-network

  app:
    image: jhangyu/palimpsest:0.01
    build:
      context: .
      dockerfile: Dockerfile
    container_name: palimpsest-app
    environment:
      DATABASE_URL: postgresql://palimpsest:palimpsest@db:5432/palimpsest
      MINIMAX_API_KEY: ""
      CHROME_MODE: server
      CHROME_WS_ENDPOINT: ws://chrome:3000
      BROWSER_WS_URL: ws://chrome:3000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CHROME_HOST: chrome
      CHROME_PORT: 3000
      BACKEND_PORT: 8088
      PALIMPSEST_DATA_DIR: /app/data
      PALIMPSEST_LOG_DIR: /app/log
    volumes:
      - /Users/jhangyu/project/palimpsest/data:/app/data
      - /Users/jhangyu/project/palimpsest/log:/app/log
    ports:
      - "8088:8088"
    depends_on:
      db:
        condition: service_healthy
      chrome:
        condition: service_started
    networks:
      - palimpsest-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  palimpsest-network:
